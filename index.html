<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asteroids</title>
<style>
  :root { --accent: #7df0ff; }
  html, body {
    margin: 0; height: 100%;
    background: #05060d;
    color: #cfe8ff;
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: radial-gradient(ellipse at 50% 30%, #0d1430 0%, #05060d 70%);
    border: 1px solid #1c2748;
    box-shadow: 0 0 60px rgba(60,120,255,0.15);
    max-width: 100vw; max-height: 100vh;
    touch-action: none;
  }
  #hint {
    position: fixed; bottom: 10px; left: 0; right: 0;
    text-align: center; font-size: 13px; color: #4a6a9a;
    pointer-events: none; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="900" height="640"></canvas></div>
<div id="hint">W / &uarr; thrust &nbsp;·&nbsp; A D / &larr; &rarr; turn &nbsp;·&nbsp; Space / click fire &nbsp;·&nbsp; Enter restart</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 900, H = 640;          // logical playfield size (see setupHiDPI)
const TAU = Math.PI * 2;

// Scale the backing store for crisp rendering on HiDPI / retina displays,
// while keeping a fixed W x H logical coordinate system for all game code.
function setupHiDPI() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ---- tunables (single source of truth for game feel) ----
const CONFIG = {
  thrust: 0.18, turn: 0.07, friction: 0.992, maxSpeed: 8,
  bulletSpeed: 9, bulletLife: 70, fireCooldown: 10,
  startInvuln: 90, respawnInvuln: 120, respawnDelay: 90,
  spawnIntervalStart: 120, spawnInterval: 130, maxAsteroids: 12,
  asteroidRadius: 16, shipRadius: 9, safeRadius: 70,
};

// ---- input ----
const keys = {};
const PREVENT_KEYS = new Set(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"]);
addEventListener("keydown", e => {
  if (PREVENT_KEYS.has(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (e.code === "Enter" && game.state === "over") reset();
});
addEventListener("keyup", e => { keys[e.code] = false; });
canvas.addEventListener("mousedown", () => { if (game.state === "playing") tryShoot(); else if (game.state === "over") reset(); });

// ---- helpers ----
const rand = (a, b) => a + Math.random() * (b - a);
function wrap(o) {
  if (o.x < 0) o.x += W; else if (o.x > W) o.x -= W;
  if (o.y < 0) o.y += H; else if (o.y > H) o.y -= H;
}

// ---- game state ----
const game = { state: "playing", score: 0, lives: 3, invuln: 0, respawn: 0, fireTimer: 0 };
let ship, asteroids, bullets, particles, spawnTimer;

// ---- ship (momentum-based, mirrors the Unity Rigidbody2D feel) ----
function makeShip() {
  return { x: W/2, y: H/2, a: -Math.PI/2, vx: 0, vy: 0, alive: true };
}

// ---- asteroids ----
// sizes: 3 = large, 2 = medium, 1 = small.  radius & score scale with size.
function spawnAsteroid(x, y, size) {
  const speed = rand(0.6, 1.6) + (3 - size) * 0.35;
  const dir = rand(0, TAU);
  const shape = [];
  const pts = 10 + Math.floor(rand(0, 4));
  for (let i = 0; i < pts; i++) shape.push(rand(0.75, 1.15));
  asteroids.push({
    x, y, size,
    r: size * CONFIG.asteroidRadius,
    vx: Math.cos(dir) * speed,
    vy: Math.sin(dir) * speed,
    a: rand(0, TAU), va: rand(-0.03, 0.03),
    shape
  });
}
function spawnFromEdge() {
  const edge = Math.floor(rand(0, 4));
  let x, y;
  if (edge === 0) { x = rand(0, W); y = -30; }
  else if (edge === 1) { x = W + 30; y = rand(0, H); }
  else if (edge === 2) { x = rand(0, W); y = H + 30; }
  else { x = -30; y = rand(0, H); }
  spawnAsteroid(x, y, 3);
}

// ---- bullets ----
function tryShoot() {
  if (game.state !== "playing" || !ship.alive || game.fireTimer > 0) return;
  bullets.push({
    x: ship.x + Math.cos(ship.a) * 14,
    y: ship.y + Math.sin(ship.a) * 14,
    vx: Math.cos(ship.a) * CONFIG.bulletSpeed + ship.vx,
    vy: Math.sin(ship.a) * CONFIG.bulletSpeed + ship.vy,
    life: CONFIG.bulletLife
  });
  game.fireTimer = CONFIG.fireCooldown;
}

// True when no asteroid sits within `safeRadius` of the ship — used to avoid
// dropping respawn invulnerability while a rock is on top of the spawn point.
function shipClear() {
  for (const a of asteroids) {
    const dx = ship.x - a.x, dy = ship.y - a.y;
    if (dx*dx + dy*dy < (a.r + CONFIG.safeRadius)**2) return false;
  }
  return true;
}

// ---- particles (explosions) ----
function boom(x, y, n, col) {
  for (let i = 0; i < n; i++) {
    const d = rand(0, TAU), s = rand(1, 4);
    particles.push({ x, y, vx: Math.cos(d)*s, vy: Math.sin(d)*s, life: rand(20, 45), col });
  }
}

function reset() {
  game.state = "playing"; game.score = 0; game.lives = 3;
  game.invuln = CONFIG.startInvuln; game.respawn = 0; game.fireTimer = 0;
  ship = makeShip();
  asteroids = []; bullets = []; particles = [];
  for (let i = 0; i < 4; i++) spawnFromEdge();
  spawnTimer = CONFIG.spawnIntervalStart;
}

// ---- collision on split (mirrors Asteroid.split: big ones spawn 2 smaller) ----
function destroyAsteroid(idx) {
  const a = asteroids[idx];
  game.score += (4 - a.size) * 20;   // small = 60, med = 40, large = 20 (classic: small worth more)
  boom(a.x, a.y, 12 + a.size * 4, "#9fd0ff");
  if (a.size > 1) { spawnAsteroid(a.x, a.y, a.size - 1); spawnAsteroid(a.x, a.y, a.size - 1); }
  asteroids.splice(idx, 1);
}

function killShip() {
  if (game.invuln > 0 || !ship.alive) return;
  ship.alive = false;
  boom(ship.x, ship.y, 30, "#ff9f6b");
  game.lives--;
  if (game.lives <= 0) { game.state = "over"; }
  else { game.respawn = CONFIG.respawnDelay; }
}

// ---- update ----
function update() {
  if (game.state === "playing") {
    if (game.fireTimer > 0) game.fireTimer--;
    if (ship.alive) {
      if (keys.KeyA || keys.ArrowLeft) ship.a -= CONFIG.turn;
      if (keys.KeyD || keys.ArrowRight) ship.a += CONFIG.turn;
      if (keys.KeyW || keys.ArrowUp) {
        ship.vx += Math.cos(ship.a) * CONFIG.thrust;
        ship.vy += Math.sin(ship.a) * CONFIG.thrust;
        if (Math.random() < 0.6)
          particles.push({ x: ship.x - Math.cos(ship.a)*12, y: ship.y - Math.sin(ship.a)*12,
            vx: -Math.cos(ship.a)*rand(1,3)+ship.vx*0.3, vy: -Math.sin(ship.a)*rand(1,3)+ship.vy*0.3,
            life: rand(10,22), col: "#ffcf6b" });
      }
      if (keys.Space) tryShoot();
      const sp = Math.hypot(ship.vx, ship.vy);
      if (sp > CONFIG.maxSpeed) { ship.vx *= CONFIG.maxSpeed/sp; ship.vy *= CONFIG.maxSpeed/sp; }
      ship.vx *= CONFIG.friction; ship.vy *= CONFIG.friction;
      ship.x += ship.vx; ship.y += ship.vy;
      wrap(ship);
      // Count invulnerability down, but never drop it on the final frame while a
      // rock is still overlapping the spawn point — prevents unfair instant death.
      if (game.invuln > 0 && (game.invuln > 1 || shipClear())) game.invuln--;
    } else if (game.respawn > 0) {
      if (--game.respawn === 0) { ship = makeShip(); game.invuln = CONFIG.respawnInvuln; }
    }

    // steady spawning
    if (--spawnTimer <= 0 && asteroids.length < CONFIG.maxAsteroids) { spawnFromEdge(); spawnTimer = CONFIG.spawnInterval; }

    // bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy; wrap(b);
      if (--b.life <= 0) { bullets.splice(i, 1); continue; }
      for (let j = asteroids.length - 1; j >= 0; j--) {
        const a = asteroids[j];
        if ((b.x-a.x)**2 + (b.y-a.y)**2 < a.r*a.r) {
          bullets.splice(i, 1);
          destroyAsteroid(j);
          break;
        }
      }
    }

    // asteroids
    for (const a of asteroids) {
      a.x += a.vx; a.y += a.vy; a.a += a.va; wrap(a);
      if (ship.alive && game.invuln <= 0) {
        if ((ship.x-a.x)**2 + (ship.y-a.y)**2 < (a.r+CONFIG.shipRadius)**2) killShip();
      }
    }
  }

  // particles always
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96;
    if (--p.life <= 0) particles.splice(i, 1);
  }
}

// ---- render ----
const stars = Array.from({length: 90}, () => ({ x: rand(0,W), y: rand(0,H), r: rand(0.4,1.6), t: rand(0,1) }));
function draw() {
  ctx.clearRect(0, 0, W, H);

  // stars
  for (const s of stars) {
    ctx.globalAlpha = 0.4 + 0.6*Math.abs(Math.sin((performance.now()/1000 + s.t*6)));
    ctx.fillStyle = "#8fb8ff";
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
  ctx.globalAlpha = 1;

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 40);
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x-1.5, p.y-1.5, 3, 3);
  }
  ctx.globalAlpha = 1;

  // asteroids
  ctx.strokeStyle = "#b9d6ff"; ctx.lineWidth = 2;
  for (const a of asteroids) {
    ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.a);
    ctx.beginPath();
    const n = a.shape.length;
    for (let i = 0; i <= n; i++) {
      const ang = (i % n) / n * TAU, rr = a.r * a.shape[i % n];
      const px = Math.cos(ang)*rr, py = Math.sin(ang)*rr;
      i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
    }
    ctx.stroke(); ctx.restore();
  }

  // bullets
  ctx.fillStyle = "#fff";
  for (const b of bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, 2.4, 0, TAU); ctx.fill(); }

  // ship
  if (game.state === "playing" && ship.alive) {
    ctx.save(); ctx.translate(ship.x, ship.y); ctx.rotate(ship.a);
    const blink = game.invuln > 0 && Math.floor(game.invuln/6) % 2 === 0;
    ctx.strokeStyle = blink ? "#5effa0" : "#7df0ff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(14, 0); ctx.lineTo(-10, -8); ctx.lineTo(-6, 0); ctx.lineTo(-10, 8);
    ctx.closePath(); ctx.stroke();
    ctx.restore();
  }

  // HUD
  ctx.fillStyle = "#cfe8ff";
  ctx.font = "20px 'Segoe UI', sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("Score: " + game.score, 18, 30);
  ctx.textAlign = "right";
  ctx.fillText("Lives: " + "▲ ".repeat(Math.max(0, game.lives)).trim(), W - 18, 30);

  // game over
  if (game.state === "over") {
    ctx.fillStyle = "rgba(5,6,13,0.72)";
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    ctx.fillStyle = "#7df0ff";
    ctx.font = "56px 'Segoe UI', sans-serif";
    ctx.fillText("GAME OVER", W/2, H/2 - 20);
    ctx.fillStyle = "#cfe8ff";
    ctx.font = "24px 'Segoe UI', sans-serif";
    ctx.fillText("Final Score: " + game.score, W/2, H/2 + 24);
    ctx.fillStyle = "#7a9cc9";
    ctx.font = "18px 'Segoe UI', sans-serif";
    ctx.fillText("Press Enter or click to play again", W/2, H/2 + 62);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
setupHiDPI();
reset();
loop();
</script>
</body>
</html>
